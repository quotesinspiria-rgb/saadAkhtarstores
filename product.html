<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details - Saad Store</title>

<link rel="stylesheet" href="style.css">


<style>

.product-page{

max-width:1200px;
margin:40px auto;
padding:30px;

display:flex;
gap:40px;

background:white;

border-radius:15px;

}


.gallery{

width:50%;
display:flex;
gap:15px;

}


.thumbnails{

width:80px;
display:flex;
flex-direction:column;
gap:12px;

}


.thumbnails img{

width:70px;
height:70px;

object-fit:cover;

border-radius:10px;

cursor:pointer;

border:2px solid transparent;

}


.thumbnails img.active{

border-color:#1f6f43;

}



.main-image-box{

flex:1;

position:relative;

display:flex;

align-items:center;

justify-content:center;

}



.main-image{

width:100%;
max-height:500px;

object-fit:contain;

border-radius:15px;

}



.arrow{

position:absolute;

top:50%;

transform:translateY(-50%);

width:45px;
height:45px;

border:none;

background:white;

border-radius:50%;

font-size:30px;

cursor:pointer;

box-shadow:0 2px 10px #aaa;

}



.prev{

left:10px;

}


.next{

right:10px;

}



.details{

width:50%;

}


.details h1{

font-size:34px;

}


.price{

font-size:30px;

font-weight:bold;

color:#1f6f43;

margin:20px 0;

}



.stock{

color:green;

font-weight:bold;

}



.quantity{

display:flex;

align-items:center;

gap:20px;

margin:25px 0;

}



.quantity button{

width:40px;

height:40px;

font-size:22px;

cursor:pointer;

}



.buy{

width:100%;

padding:15px;

margin-top:10px;

background:#1f6f43;

color:white;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

}



.cart{

background:white;

color:#1f6f43;

border:2px solid #1f6f43;

}



.features{

margin-top:25px;

line-height:2;

}



.cod-box{

margin-top:20px;

padding:15px;

background:#f5f5f5;

border-radius:10px;

}



@media(max-width:768px){


.product-page{

display:block;

padding:20px;

}


.gallery,
.details{

width:100%;

}


.thumbnails{

width:100%;

flex-direction:row;

overflow:auto;

}


.main-image{

height:350px;

}


}



</style>

</head>



<body>



<div class="product-page">



<!-- GALLERY -->

<div class="gallery">



<div class="thumbnails" id="thumbs"></div>



<div class="main-image-box">


<button class="arrow prev" onclick="previousImage()">
‹
</button>


<img id="mainImage" class="main-image">



<button class="arrow next" onclick="nextImage()">
›
</button>



</div>


</div>





<!-- DETAILS -->


<div class="details">


<h1 id="productTitle"></h1>



<div class="stock" id="productStock"></div>



<div class="price" id="productPrice"></div>



<p id="productDescription"></p>



<div class="features" id="features"></div>




<div class="quantity">


<button onclick="minus()">-</button>


<span id="qty">
1
</span>


<button onclick="plus()">+</button>


</div>





<button class="buy">
Buy Now
</button>



<button class="buy cart">
Add To Cart
</button>





<div class="cod-box">

🚚 Cash On Delivery Available

<br>

↩ Easy Returns

<br>

✔ Verified Products

</div>



</div>



</div>








<script src="products.js"></script>

<script src="cart.js"></script>



<script>


// GET PRODUCT ID


const params=new URLSearchParams(window.location.search);


const id=params.get("id");



const product=PRODUCTS.find(
p=>p.id===id
);



if(!product){

document.body.innerHTML="<h1>Product Not Found</h1>";

throw new Error("Product not found");

}





// DETAILS


document.getElementById("productTitle").innerText =
product.title;



document.getElementById("productPrice").innerText =
product.priceDisplay;



document.getElementById("productStock").innerText =
"✔ "+product.stock+" in stock";



document.getElementById("productDescription").innerText =
product.description;





// FEATURES


const featureBox=document.getElementById("features");



product.features.forEach(feature=>{


let p=document.createElement("p");

p.innerHTML="✓ "+feature;

featureBox.appendChild(p);


});





// IMAGE GALLERY



let images=product.images;


let current=0;


const main=document.getElementById("mainImage");

const thumbs=document.getElementById("thumbs");




function showImage(index){


current=index;


main.src=images[index];


document.querySelectorAll(".thumbnails img")
.forEach(img=>img.classList.remove("active"));



thumbs.children[index].classList.add("active");


}




images.forEach((img,index)=>{


let image=document.createElement("img");


image.src=img;



image.onclick=()=>{


showImage(index);


};



thumbs.appendChild(image);



});



showImage(0);





function nextImage(){


current++;


if(current>=images.length){

current=0;

}


showImage(current);


}





function previousImage(){


current--;


if(current<0){

current=images.length-1;

}


showImage(current);


}






// QUANTITY



let quantity=1;



function plus(){


if(quantity < product.stock){

quantity++;

}


document.getElementById("qty").innerText=quantity;


}



function minus(){


if(quantity>1){

quantity--;

}


document.getElementById("qty").innerText=quantity;


}





// ADD CART



document.querySelector(".cart")
.onclick=function(){


for(let i=0;i<quantity;i++){

Cart.add(product.id);

}


alert("Product added to cart");


};







// BUY NOW



document.querySelector(".buy")
.onclick=function(){


for(let i=0;i<quantity;i++){

Cart.add(product.id);

}


window.location.href="index.html";


};



</script>



</body>

</html>
