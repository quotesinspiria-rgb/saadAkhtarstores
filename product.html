<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saad Store Product</title>

<link rel="stylesheet" href="style.css">


<style>

.product-page{

max-width:1200px;
margin:40px auto;
padding:30px;

display:flex;
gap:40px;

background:white;

border-radius:15px;

}



.gallery{

width:50%;
display:flex;
gap:15px;

}



.thumbnails{

width:80px;
display:flex;
flex-direction:column;
gap:10px;

}



.thumbnails img{

width:70px;
height:70px;

object-fit:cover;

border-radius:10px;

cursor:pointer;

border:2px solid transparent;

}


.thumbnails img.active{

border-color:#1f6f43;

}



.main-image-box{

flex:1;

position:relative;

}



.main-image{

width:100%;

height:500px;

object-fit:contain;

}



.arrow{

position:absolute;

top:50%;

transform:translateY(-50%);

border:none;

background:white;

font-size:30px;

width:45px;

height:45px;

border-radius:50%;

cursor:pointer;

}



.prev{

left:10px;

}



.next{

right:10px;

}



.details{

width:50%;

}



.price{

font-size:32px;

font-weight:bold;

color:#1f6f43;

margin:20px 0;

}



.stock{

color:green;

}



.quantity{

display:flex;

gap:20px;

align-items:center;

margin:20px 0;

}



.quantity button{

width:40px;

height:40px;

cursor:pointer;

}



.buy{

width:100%;

padding:15px;

margin-top:10px;

background:#1f6f43;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

font-size:17px;

}



.cart{

background:white;

color:#1f6f43;

border:2px solid #1f6f43;

}



.wishlist-product{

width:100%;

padding:12px;

margin-top:10px;

background:white;

border:1px solid #1f6f43;

color:#1f6f43;

border-radius:10px;

cursor:pointer;

}



.features{

margin-top:20px;

line-height:2;

}



.related{

max-width:1200px;

margin:40px auto;

}



.related-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

}



.related-card{

background:white;

padding:15px;

cursor:pointer;

border-radius:10px;

}



.related-card img{

width:100%;

height:200px;

object-fit:cover;

}



.review-box{

background:white;

padding:20px;

border-radius:10px;

}



@media(max-width:768px){


.product-page{

display:block;

}



.gallery,
.details{

width:100%;

}



.related-grid{

grid-template-columns:1fr;

}


}


</style>


</head>


<body>



<div class="product-page">


<div class="gallery">


<div class="thumbnails" id="thumbs"></div>



<div class="main-image-box">


<button class="arrow prev" onclick="previousImage()">
‹
</button>


<img id="mainImage" class="main-image">


<button class="arrow next" onclick="nextImage()">
›
</button>


</div>


</div>





<div class="details">


<h1 id="productTitle"></h1>


<div class="stock" id="productStock"></div>


<div class="price" id="productPrice"></div>



<p id="productDescription"></p>



<div class="features" id="features"></div>



<div class="quantity">


<button onclick="minus()">-</button>


<span id="qty">
1
</span>


<button onclick="plus()">+</button>


</div>



<button class="buy">
Buy Now
</button>



<button class="buy cart">
Add To Cart
</button>



<button class="wishlist-product">
♡ Add Wishlist
</button>



</div>


</div>





<section class="related">


<h2>
You May Also Like
</h2>


<div class="related-grid" id="relatedProducts"></div>


</section>






<section class="related">


<h2>
Customer Reviews
</h2>


<div class="review-box">

⭐⭐⭐⭐⭐

<p>
Excellent quality product. Highly recommended.
</p>

<strong>
Verified Customer
</strong>


</div>


</section>







<script src="products.js"></script>

<script src="cart.js"></script>

<script src="wishlist.js"></script>



<script>


const params =
new URLSearchParams(window.location.search);



const id =
params.get("id");



const product =
PRODUCTS.find(
p=>p.id===id
);



if(!product){

document.body.innerHTML=
"<h1>Product Not Found</h1>";

throw new Error();

}





document.getElementById("productTitle").innerText =
product.title;



document.getElementById("productPrice").innerText =
product.priceDisplay;



document.getElementById("productStock").innerText =
"✔ "+product.stock+" in stock";



document.getElementById("productDescription").innerText =
product.description;






// FEATURES


product.features.forEach(f=>{


let p=document.createElement("p");

p.innerHTML="✓ "+f;


document
.getElementById("features")
.appendChild(p);


});







// IMAGES


let current=0;


const main =
document.getElementById("mainImage");


const thumbs =
document.getElementById("thumbs");



product.images.forEach((img,index)=>{


let image=document.createElement("img");


image.src=img;



image.onclick=()=>{

showImage(index);

};



thumbs.appendChild(image);


});




function showImage(index){


current=index;


main.src =
product.images[index];


document
.querySelectorAll(".thumbnails img")
.forEach(x=>x.classList.remove("active"));


thumbs.children[index]
.classList.add("active");


}



showImage(0);





function nextImage(){

current++;


if(current>=product.images.length){

current=0;

}


showImage(current);

}



function previousImage(){

current--;


if(current<0){

current=product.images.length-1;

}


showImage(current);

}







// QUANTITY


let quantity=1;



function plus(){


if(quantity<product.stock){

quantity++;

}


document.getElementById("qty").innerText=quantity;


}



function minus(){


if(quantity>1){

quantity--;

}


document.getElementById("qty").innerText=quantity;


}







// CART


document.querySelector(".cart")
.onclick=function(){


for(let i=0;i<quantity;i++){

Cart.add(product.id);

}


alert("Added to cart");


};






// BUY


document.querySelector(".buy")
.onclick=function(){


for(let i=0;i<quantity;i++){

Cart.add(product.id);

}


location.href="index.html";


};







// WISHLIST


const wish =
document.querySelector(".wishlist-product");



function updateWish(){


wish.innerText =
Wishlist.has(product.id)
?
"♥ Added To Wishlist"
:
"♡ Add Wishlist";


}



wish.onclick=function(){

Wishlist.toggle(product.id);

updateWish();

};



updateWish();








// RELATED PRODUCTS



const related =
PRODUCTS.filter(p=>
p.category===product.category &&
p.id!==product.id
);



related.forEach(item=>{


let card=document.createElement("div");


card.className="related-card";


card.innerHTML=`

<img src="${item.images[0]}">

<h3>${item.title}</h3>

<p>${item.priceDisplay}</p>

`;



card.onclick=function(){

location.href=
"product.html?id="+item.id;

};



document
.getElementById("relatedProducts")
.appendChild(card);


});



</script>



</body>

</html>
