<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saad Akhtar Store | Online Shopping Pakistan</title>

<meta name="description" content="Shop Fashion, Clothing, Beauty, Tech & Perfumes">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- TOP BAR -->

<div class="top-bar">

<span>🚚 Free Delivery Over Rs 3000</span>

<span>💳 Cash On Delivery</span>

<span>✔ 100% Original Products</span>

<span>⭐ Trusted Online Store</span>

</div>

<!-- HEADER -->

<header class="site-header">

<div class="wrap main-header">

<a href="index.html" class="wordmark">

Saad Akhtar Store

</a>

<div class="search-box">

<input type="text" placeholder="Search Products">

<button>Search</button>

</div>

<div class="header-links">

<a href="login.html">👤 Login</a>

<a href="orders.html">📦 Orders</a>

<a href="wishlist.html">❤️ Wishlist</a>

<button class="cart-toggle" id="cartToggle">

🛒 Cart

<span class="cart-count" id="cartCount">

0

</span>

</button>

</div>

</div>

<!-- CATEGORY MENU -->

<div class="category-menu">

<button class="cat-btn active" data-filter="all">
All
</button>

<button class="cat-btn" data-filter="fashion">
Fashion
</button>

<button class="cat-btn" data-filter="clothing">
Clothing
</button>

<button class="cat-btn" data-filter="beauty">
Beauty
</button>

<button class="cat-btn" data-filter="tech">
Tech
</button>

<button class="cat-btn" data-filter="perfume">
Perfume
</button>

</div>

</header>

<!-- HERO -->
<section class="slider">

<div class="slide">
<img src="images/banner1.png" alt="Banner 1">
</div>

<div class="slide">
<img src="images/banner2.png" alt="Banner 2">
</div>

<div class="slide">
<img src="images/banner3.png" alt="Banner 3">
</div>

<button class="prev">&#10094;</button>
<button class="next">&#10095;</button>

</section>

<section class="category-section wrap">

<h2>Shop By Category</h2>

<div class="circle-categories">

<div class="cat-box">
👕<br>Fashion
</div>

<div class="cat-box">
👔<br>Clothing
</div>

<div class="cat-box">
💄<br>Beauty
</div>

<div class="cat-box">
💻<br>Tech
</div>

<div class="cat-box">
🌸<br>Perfume
</div>

</div>

</section>

<!-- FOOTER -->

<footer class="site-footer">

<div class="wrap footer-row">

<p>© 2026 Saad Akhtar Store</p>

<p>Cash On Delivery Available</p>

</div>

</footer>

<!-- CART -->

<div class="cart-overlay" id="cartOverlay"></div>

<aside class="cart-drawer" id="cartDrawer">

<div class="cart-head">

<h2>Your Order</h2>

<button id="cartClose">×</button>

</div>

<div id="cartItems"></div>

<div class="cart-foot">

<div class="cart-total-row">

<span>Subtotal</span>

<span id="cartSubtotal">Rs 0</span>

</div>

<input
class="form-input"
id="custName"
placeholder="Full Name">

<input
class="form-input"
id="custPhone"
placeholder="Phone Number">

<textarea
class="form-input"
id="custAddress"
placeholder="Address"></textarea>

<button
class="checkout-btn"
id="checkoutBtn">

Place Order

</button>

<p
id="checkoutError"
hidden></p>

</div>

</aside>

<!-- PRODUCT CARD -->

<template id="cardTemplate">

<article class="card">

<div class="card-swatch">

<span class="stamp-badge">

<span class="stamp-price"></span>

</span>

</div>

<div class="card-body">

<p class="card-eyebrow"></p>

<h3 class="card-title"></h3>

<p class="card-desc"></p>

<button class="add-btn">

Add To Cart

</button>

</div>

</article>

</template>

<script src="products.js"></script>

<script src="cart.js"></script>

<script src="app.js"></script>

</body>

</html>
</html>
